{% macro health_card(title, icon, value, status, progress, progress_label, progress_color, border, text_color, badge_color, footer) %}
<div class="card border-{{ border }} shadow-sm h-100">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h6 class="card-title text-{{ text_color }} mb-1">
                    <i class="bi bi-{{ icon }} me-1"></i> {{ title }}
                </h6>
                <p class="card-text display-6 mb-0">{{ value }}</p>
            </div>
            <span class="badge bg-{{ badge_color }}">{{ status }}</span>
        </div>
        {% if progress %}
        <div class="mt-3">
            <div class="progress custom-progress-height">
                <div class="progress-bar bg-{{ progress_color }} progress-bar-width-{{ progress|int }}"
                     role="progressbar"
                     aria-label="{{ progress_label }}">
                </div>
            </div>
            <small class="text-muted">{{ progress_label }}</small>
        </div>
        {% endif %}
    </div>
    <div class="card-footer bg-transparent border-0 pt-0">
        <small class="text-muted">{{ footer }}</small>
    </div>
</div>
{% endmacro %}
